name: Release to NuGet

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: src
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        # global.json pins the build SDK (.NET 10). The net8.0 test target also
        # needs the 8.0 runtime; net48 uses the runner's installed .NET Framework.
        global-json-file: src/global.json
        dotnet-version: 8.0.x
    - name: Build
      run: dotnet build -c Release repo.slnx
    - name: Test
      run: dotnet test -c Release --no-build repo.slnx
    - name: Pack nugets
      run: dotnet pack -c Release --no-build WindyCliffs.Clock/WindyCliffs.Clock.csproj --output out/
    - name: Push to NuGet
      run: dotnet nuget push out/*.nupkg --api-key ${{secrets.nuget_publish}} --source https://api.nuget.org/v3/index.json
